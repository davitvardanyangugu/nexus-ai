<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXUS</title>

<style>
body{
    margin:0;
    background:#0d1117;
    color:white;
    font-family:Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#161b22;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.msg{
    max-width:70%;
    padding:12px;
    margin:8px;
    border-radius:14px;
    white-space:pre-wrap;
}

.user{ background:#238636; align-self:flex-end; }
.bot{ background:#21262d; align-self:flex-start; }

#bottom{
    display:flex;
    padding:12px;
    background:#161b22;
}

#userInput{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#21262d;
    color:white;
}

button{
    margin-left:10px;
    padding:12px 14px;
    border:none;
    border-radius:10px;
    background:#238636;
    color:white;
    cursor:pointer;
}
button:hover{ background:#2ea043; }
</style>
</head>

<body>

<header>NEXUS</header>

<div id="chat"></div>

<div id="bottom">
    <input id="userInput" placeholder="Speak or type...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
    const input = document.getElementById("userInput");
    const text = input.value;

    if(!text.trim()) return;

    addMessage(text, "user");
    input.value = "";

    const res = await fetch("/ask?q=" + encodeURIComponent(text));
    const data = await res.json();

    addMessage(data.answer, "bot");

    speak(data.answer);
}

function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";
    utter.rate = 1;
    window.speechSynthesis.speak(utter);
}

function startVoice(){
    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Voice not supported in this browser");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event){
        const text = event.results[0][0].transcript;
        document.getElementById("userInput").value = text;
        sendMessage();
    };
}

addMessage("NEXUS voice system online.", "bot");
</script>

</body>
</html>
